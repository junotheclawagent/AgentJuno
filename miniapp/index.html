<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Juno</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-deep: #050d24;
      --navy: #0a1e4a;
      --cream: #f5e9d3;
      --cream-dim: rgba(245, 233, 211, 0.5);
      --cream-faint: rgba(245, 233, 211, 0.35);
      --coral: #ff9580;
      --accent: #c8392e;
      --user-blue: #88c0d0;
      --rule: rgba(245, 233, 211, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, Monaco, Consolas, monospace;
      background: var(--navy-deep);
      color: var(--cream);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .header {
      background: var(--navy-deep);
      border-bottom: 1px solid var(--rule);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-dots {
      display: flex;
      gap: 5px;
    }

    .header-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #2a3a62;
    }

    .header-title {
      color: var(--cream-dim);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
    }

    .status-text {
      color: var(--cream-dim);
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .stop-btn {
      background: transparent;
      border: 1px solid rgba(200, 57, 46, 0.4);
      color: var(--coral);
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }

    .stop-btn:hover, .stop-btn:active {
      background: rgba(200, 57, 46, 0.15);
    }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

    /* MESSAGE LINES */
    .msg {
      display: flex;
      gap: 8px;
      line-height: 1.65;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .msg-prefix {
      flex-shrink: 0;
      color: var(--cream-faint);
      font-weight: 400;
    }

    .msg.user .msg-prefix {
      color: var(--user-blue);
    }

    .msg.user .msg-prefix::before {
      content: "You ▸ ";
      color: var(--cream-faint);
    }

    .msg.juno .msg-prefix::before {
      content: "Juno ◂ ";
      color: var(--cream-faint);
    }

    .msg-body {
      flex: 1;
      color: var(--cream);
      white-space: pre-wrap;
    }

    .msg.user .msg-body {
      color: var(--user-blue);
    }

    .msg-note {
      color: var(--cream-faint);
      font-style: italic;
      font-size: 12px;
      margin-top: 4px;
      padding-left: 0;
    }

    /* THINKING */
    .thinking-line {
      display: flex;
      gap: 8px;
      align-items: center;
      line-height: 1.65;
    }

    .thinking-prefix {
      color: var(--cream-faint);
    }

    .thinking-prefix::before {
      content: "Juno ◂ ";
    }

    .thinking-dots {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }

    .thinking-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--cream-dim);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }

    /* INPUT */
    .input-area {
      background: var(--navy-deep);
      border-top: 1px solid var(--rule);
      padding: 12px 16px env(safe-area-inset-bottom) 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-field {
      font-size: 16px;
      flex: 1;
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--cream);
      background: rgba(10, 30, 74, 0.4);
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
    }

    .input-field::placeholder {
      color: var(--cream-faint);
    }

    .input-field:focus {
      border-color: var(--user-blue);
      background: rgba(10, 30, 74, 0.6);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: var(--navy);
      border: 1px solid var(--rule);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover, .send-btn:active {
      background: #122a5e;
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .send-btn svg {
      fill: var(--cream);
      width: 14px;
      height: 14px;
    }

    /* STOP CONFIRMATION */
    .stop-sheet {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 13, 36, 0.8);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .stop-sheet.open {
      display: flex;
    }

    .stop-sheet-inner {
      background: var(--navy);
      border-top: 1px solid var(--rule);
      border-radius: 12px 12px 0 0;
      padding: 20px 18px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 480px;
    }

    .stop-sheet-title {
      font-size: 14px;
      color: var(--coral);
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .stop-sheet-desc {
      font-size: 13px;
      color: var(--cream-dim);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .stop-sheet-btns {
      display: flex;
      gap: 8px;
    }

    .stop-confirm {
      flex: 1;
      background: var(--accent);
      color: var(--cream);
      border: none;
      padding: 11px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .stop-cancel {
      flex: 1;
      background: transparent;
      color: var(--cream-dim);
      border: 1px solid var(--rule);
      padding: 11px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    /* WELCOME */
    .welcome-note {
      color: var(--cream-faint);
      font-size: 12px;
      font-style: italic;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-dots">
        <div class="header-dot"></div>
        <div class="header-dot"></div>
        <div class="header-dot"></div>
      </div>
      <span class="header-title">Telegram → Juno</span>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        <span class="status-text">operational</span>
      </div>
      <button class="stop-btn" onclick="openStop()">⚠ stop</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome-note">— ready. what do you need?</div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea class="input-field" id="input"
      placeholder="message juno…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <!-- STOP CONFIRMATION SHEET -->
  <div class="stop-sheet" id="stopSheet">
    <div class="stop-sheet-inner">
      <div class="stop-sheet-title">⚠ stop everything?</div>
      <div class="stop-sheet-desc">halts all running tasks and scheduled jobs. juno will confirm what was stopped.</div>
      <div class="stop-sheet-btns">
        <button class="stop-confirm" onclick="confirmStop()">stop everything</button>
        <button class="stop-cancel" onclick="closeStop()">cancel</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const BACKEND = "https://junotheclawagent.duckdns.org";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 100) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, role) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;

      const prefix = document.createElement("span");
      prefix.className = "msg-prefix";

      const body = document.createElement("span");
      body.className = "msg-body";
      body.textContent = text;

      msg.appendChild(prefix);
      msg.appendChild(body);
      messagesEl.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function addThinking() {
      const wrap = document.createElement("div");
      wrap.className = "thinking-line";

      wrap.innerHTML = `
        <span class="thinking-prefix"></span>
        <span class="thinking-dots">
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
        </span>
      `;

      messagesEl.appendChild(wrap);
      scrollToBottom();
      return wrap;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
            sendBtn.disabled = true;inputEl.style.height = "auto";
      sendBtn.disabled = true;
      inputEl.blur();
      addMessage(text, "user");
      const thinkingEl = addThinking();

      try {
        const initData = tg.initData || "dev-mode";

        const res = await fetch(`${BACKEND}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, initData }),
        });

        const data = await res.json();
        thinkingEl.remove();

        if (res.ok) {
          addMessage(data.reply, "juno");
        } else {
          addMessage(`error: ${data.detail || "something went wrong"}`, "juno");
        }
      } catch (err) {
        thinkingEl.remove();
        addMessage("could not reach juno. check your connection.", "juno");
      }

      sendBtn.disabled = false;
      scrollToBottom();
    }

    function openStop() {
      document.getElementById("stopSheet").classList.add("open");
    }

    function closeStop() {
      document.getElementById("stopSheet").classList.remove("open");
    }

    async function confirmStop() {
      closeStop();
      addMessage("stop everything", "user");
      const thinkingEl = addThinking();

      try {
        const initData = tg.initData || "dev-mode";
        const res = await fetch(`${BACKEND}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: "stop everything", initData }),
        });
        const data = await res.json();
        thinkingEl.remove();
        addMessage(data.reply || "stopped.", "juno");
      } catch (err) {
        thinkingEl.remove();
        addMessage("stop command sent.", "juno");
      }
    }
  </script>

</body>
</html>
